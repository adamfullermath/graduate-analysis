<h3 class="heading"><span class="type">Paragraph</span></h3>
<div class="para">We thus shown have that the Cantor set <span class="process-math">\(C\)</span> has Lebesgue measure <span class="process-math">\(0\)</span> and is uncountable. Hence the converse of <a href="sec-Lebesgue.html#thm-countable-L-measurable" class="xref" data-knowl="./knowl/xref/thm-countable-L-measurable.html" data-reveal-label="Reveal" data-close-label="Close" title="Theorem 3.1.3">Theorem 3.1.3</a> does not hold. All countable sets have Lebesgue measure <span class="process-math">\(0\text{,}\)</span> but not all Lebesgue measure <span class="process-math">\(0\)</span> sets are countable.<div class="autopermalink" data-description="Paragraph"><a href="#sec-nonmeasurable-12" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
