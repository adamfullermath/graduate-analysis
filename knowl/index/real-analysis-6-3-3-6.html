</h3>
<div class="para">Let <span class="process-math">\(V\)</span> be a normed vector space. A <em class="emphasis">linear functional</em> is a continuous linear map from <span class="process-math">\(V\)</span> to <span class="process-math">\(\mathbb{R}\text{.}\)</span><div class="autopermalink" data-description="Paragraph"><a href="#real-analysis-6-3-3-6-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
<div class="para">Denote by <span class="process-math">\(V^*\)</span> the collection of all linear functionals on <span class="process-math">\(V\text{.}\)</span> The space <span class="process-math">\(V^*\)</span> is called the <em class="emphasis">dual space</em> of <span class="process-math">\(V\text{.}\)</span><div class="autopermalink" data-description="Paragraph"><a href="#real-analysis-6-3-3-6-2" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
