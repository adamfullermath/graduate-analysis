</h3>
<div class="para">Let <span class="process-math">\((X,\mathcal{F},\mu)\)</span> be a measure space, let <span class="process-math">\((f_n)_n\)</span> be a sequence of non-negative measurable functions, and let <span class="process-math">\(f = \sum_{n=1}^\infty f_n.\)</span> Then<div class="autopermalink" data-description="Paragraph"><a href="#cor-MCT-series-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
</div>
<div class="displaymath process-math">
\begin{equation*}
\int_X f \, d\mu = \sum_{k=1}^\infty \int_X f_n\, d\mu.
\end{equation*}
</div>
